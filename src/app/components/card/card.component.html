@let ui = coreUi();

<div class="card-header">
    <h3>{{ data | localize: 'name' }}</h3>
    <button
        matIconButton
        [aria-label]="ui.showOnMap"
        (click)="goToLocation$.next();"
    >
        <mat-icon>my_location</mat-icon>
    </button>
    <button
        matIconButton
        [aria-label]="ui.share"
        (click)="share()"
    >
        <mat-icon class="share-icon">ios_share</mat-icon>
    </button>
    <button
        matIconButton
        [aria-label]="ui.close"
        (click)="close()"
    >
        <mat-icon>close</mat-icon>
    </button>
</div>

@let area = data | area;

<div class="card-subtitle">
    @if (data.type) {
        <span>{{ data | localize: 'type' }}</span>

        @if (area?.length) {
            <span class="bullet">&bull;</span>
        }
    }

    @for (areaPart of area; track areaPart; let last = $last) {
        <span>{{ areaPart }}</span>

        @if (!last) {
            <span>, </span>
        }
    }
</div>

<div class="description">{{ data | localize: 'description' }}</div>
